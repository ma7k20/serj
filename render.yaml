databases:
  - name: serj-db
    plan: free
    databaseName: serj
    user: serj_user

services:
  - type: web
    name: serj-profit-system
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: "Trader Profit System"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: serj-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: serj-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: serj-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: serj-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: serj-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: RUN_MIGRATIONS
        value: "true"
